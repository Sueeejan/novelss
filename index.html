<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; }
    .tab-content { display: none; }
    .active { display: block; }
    nav { display: flex; gap: 10px; margin-bottom: 20px; }
    input, select, button { display: block; width: 100%; margin: 8px 0; padding: 10px; box-sizing: border-box; }
    button { background: #FFEEDD; border: 1px solid #ccc; cursor: pointer; }
    .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 10px 0; }
    li { list-style: none; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
  </style>
</head>
<body>

<nav>
  <button onclick="checkPassword()">輸入頁</button>
  <button onclick="showTab('listTab')">歷史紀錄</button>
</nav>

<div id="inputTab" class="tab-content">
  <h2>新增紀錄</h2>
  <input type="text" id="bookName" placeholder="書名">
  <input type="text" id="author" placeholder="作者">
  <input type="text" id="maleLead" placeholder="男主角">
  <input type="text" id="femaleLead" placeholder="女主角">
  <label>類型:</label>
  <div class="checkbox-group" id="genreGroup">
    <label><input type="checkbox" value="玄幻"> 玄幻</label>
    <label><input type="checkbox" value="言情"> 言情</label>
    <label><input type="checkbox" value="武俠"> 武俠</label>
    <label><input type="checkbox" value="懸疑"> 懸疑</label>
    <label><input type="checkbox" value="科幻"> 科幻</label>
  </div>
  <select id="rating">
    <option value="1">⭐ (普通)</option>
    <option value="2">⭐⭐ (喜歡)</option>
    <option value="3">⭐⭐⭐ (超愛)</option>
  </select>
  <button onclick="saveRecord()">儲存紀錄</button>
</div>

<div id="listTab" class="tab-content active">
  <h2>歷史紀錄</h2>
  <ul id="recordList">載入中...</ul>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyKpXJF8JAL-AICCxDcPDceQ6lp10ammVEcU1VXmQb2fbLmR1KQt3gKB42VWE_MHAlw/exec";
  const MY_PASSWORD = "12345";

  function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    if(tabId === 'listTab') renderList();
  }

  function checkPassword() {
    const p = prompt("請輸入管理密碼：");
    if (p === MY_PASSWORD) showTab('inputTab');
    else if (p !== null) alert("密碼錯誤");
  }

  async function saveRecord() {
    const data = {
      name: document.getElementById('bookName').value,
      author: document.getElementById('author').value,
      male: document.getElementById('maleLead').value,
      female: document.getElementById('femaleLead').value,
      genre: Array.from(document.querySelectorAll('#genreGroup input:checked')).map(cb => cb.value).join(','),
      rating: document.getElementById('rating').value,
      time: new Date().toLocaleString()
    };
    if(!data.name) return alert('書名必填');
    try {
      await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
      alert('儲存成功');
      showTab('listTab');
    } catch(e) { alert('儲存失敗'); }
  }

  async function renderList() {
    const list = document.getElementById('recordList');
    try {
      const res = await fetch(WEB_APP_URL + "?t=" + new Date().getTime());
      const data = await res.json();
      list.innerHTML = '';
      data.slice(1).reverse().forEach(r => {
        list.innerHTML += `<li><strong>${r.name}</strong><br>作者：${r.author}<br>評分：${'⭐'.repeat(r.rating)}</li>`;
      });
    } catch(e) { list.innerHTML = '無法載入資料，請確認部署權限為「所有人」'; }
  }
</script>
</body>
</html>
